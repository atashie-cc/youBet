strategy:
  name: "full_universe_momentum"
  description: "Top 10 from all 52 ETFs by 6-month momentum, diversification-constrained"

signal:
  lookback_months: 6
  top_k: 10
  absolute_momentum: true
  weighting: "inverse_volatility"
  risk_off_ticker: "VGSH"
  vol_lookback_days: 63
  max_per_class: 0.30             # No asset class can exceed 30% of portfolio

backtest:
  train_months: 36
  test_months: 12
  step_months: 12
  rebalance_frequency: "monthly"
  initial_capital: 100000
