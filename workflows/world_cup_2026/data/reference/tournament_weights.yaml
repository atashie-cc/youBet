# Tournament taxonomy for international Elo weighting
#
# Maps every tournament string in data/raw/results.csv to one of 5 tiers.
# Tiers are applied as K multipliers in compute_elo.py:
#   world_cup = 2.0
#   continental = 1.5
#   nations_league = 1.4
#   qualifier = 1.2
#   friendly = 0.8
#
# Principles for classification:
#   world_cup      - FIFA World Cup only (highest-stakes senior competition)
#   continental    - senior national team competitions at confederation or
#                    regional level with competitive stakes (Euro, Copa America,
#                    AFCON, Asian Cup, Gold Cup, ONC, plus sub-confederation
#                    championships that are recognized competitive tournaments)
#   nations_league - UEFA and CONCACAF Nations League only (novel format,
#                    formally structured league competition)
#   qualifier      - any tournament name ending in "qualification"
#   friendly       - genuine friendlies, invitational cups, multi-sport games
#                    (Olympics, Asian Games, Pan American Games, etc. are U-23
#                    or amateur and should NOT count as senior competition),
#                    CONIFA (non-FIFA), and rare one-off tournaments
#
# Rationale for multi-sport games as friendlies: since 1984 the Olympics have
# been U-23 with three overage players, and earlier editions were amateur.
# Same for Asian Games, Pan American Games, and most regional Games events.
# These are not senior international competition in the FIFA sense.
#
# Rationale for British Home Championship as continental: it ran 1884-1984 as
# the primary competitive tournament between England, Scotland, Wales, and
# Northern Ireland, with national-team stakes.
#
# Updated 2026-04-11 during Phase 1 v2 to fix Codex-flagged systematic
# friendly-default bias that underweighted 175 of 193 tournaments.

