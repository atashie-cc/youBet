# League strength scores (0-100) for computing squad-quality features.
#
# Based on UEFA club coefficients (2024-25 cycle) + global league reputation.
# Used to map player club → league → strength, then average per national team.
#
# Tier 1 (90-100): Top 5 European leagues
# Tier 2 (75-89): Strong European + top South American
# Tier 3 (55-74): Mid-European + MLS/Liga MX/Saudi + top Asian
# Tier 4 (35-54): Smaller European + African/Asian leagues
# Tier 5 (15-34): Minor leagues

# Partial league names are matched via substring (case-insensitive).
# A club is assigned to the FIRST matching league in this list.
# Clubs with no match get default_score.

default_score: 50

