# NCAA March Madness 2026 Configuration

workflow:
  name: "ncaa_march_madness"
  description: "NCAA Men's Basketball March Madness bracket prediction"
  year: 2026

data:
  sources:
    - name: "kaggle"
      competition: "march-machine-learning-mania-2026"
      files:
        - "MRegularSeasonDetailedResults.csv"
        - "MNCAATourneyDetailedResults.csv"
        - "MNCAATourneySeeds.csv"
        - "MMasseyOrdinals.csv"
        - "MTeams.csv"
        - "MSeasons.csv"
    - name: "espn"
      url: "https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball"
      requires_auth: false
      coverage: "2018-2025 game results + box scores"
      script: "scrape_game_results.py"
    - name: "kenpom"
      url: "https://kenpom.com"
      requires_auth: true
    - name: "barttorvik"
      url: "https://barttorvik.com"
      requires_auth: false
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  reference_dir: "data/reference"
  seasons:
    train_start: 2003
    train_end: 2022
    val_start: 2023
    val_end: 2025
    test_start: 2026
    test_end: 2026
    predict_year: 2026

features:
  differentials:
    - "adj_oe"          # Adjusted offensive efficiency
    - "adj_de"          # Adjusted defensive efficiency
    - "net_eff"         # Net efficiency margin
    - "adj_tempo"       # Adjusted tempo
    - "sos"             # Strength of schedule
    - "seed"            # Tournament seed
    - "elo"             # Custom Elo rating
    - "kenpom_rank"     # KenPom ranking
    - "win_pct"         # Season win percentage
    - "win_pct_last5"   # Last 5 games win percentage
    - "to_rate"         # Turnover rate
    - "ft_rate"         # Free throw rate
    - "three_pt_rate"   # Three-point shooting rate
    - "oreb_rate"       # Offensive rebound rate
    - "ast_rate"        # Assist rate
    - "blk_rate"        # Block rate
    - "stl_rate"        # Steal rate
    - "experience"      # Team experience/continuity
  rolling_windows: [5, 10]
  normalize: true
  normalize_method: "standard"

elo:
  k_factor: 20.0
  home_advantage: 100.0
  initial_rating: 1500.0
  mean_reversion_factor: 0.75
  seed_season: 2002
  tournament_daynum_cutoff: 134

model:
  backend: "xgboost"
  params:
    max_depth: 7
    learning_rate: 0.01
    n_estimators: 1000
    subsample: 0.8
    colsample_bytree: 1.0
    min_child_weight: 7
    reg_alpha: 0.1
    reg_lambda: 1.0
  sample_weight:
    decay: 0.3          # was 0.5 — Phase 10 Exp 4 sweet spot [0.1-0.4]
    max_daynum: 132
  early_stopping_rounds: 50  # Phase 10 Exp 1 showed convergence at ~414/750

split:
  train_frac: 0.60
  val_frac: 0.20
  season_col: "season"

calibration:
  method: "platt"
  clip_min: 0.03
  clip_max: 0.97
  val_window_seasons: 3

evaluation:
  primary_metric: "log_loss"
  metrics: ["log_loss", "accuracy", "brier_score"]

bracket:
  simulations: 10000
  strategies:
    - name: "chalk"
      description: "Always pick the higher probability team"
    - name: "balanced"
      description: "Pick upsets proportional to model probability"
    - name: "contrarian"
      description: "Slightly favor upsets for pool differentiation"
      upset_boost: 0.10

bankroll:
  initial: 1000.0
  kelly_fraction: 0.25
  min_edge: 0.05
  max_bet_fraction: 0.10
